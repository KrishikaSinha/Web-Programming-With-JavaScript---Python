<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🛒 My Shop</h1>
    <p class="tagline">Best deals just for you ✨</p>
</header>

<!-- PRODUCTS -->
<section class="products">

    <div class="card">
        <h3>Product 1</h3>
        <p class="price">₹500</p>
        <button onclick="addToCart('Product 1', 500)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>Product 2</h3>
        <p class="price">₹700</p>
        <button onclick="addToCart('Product 2', 700)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>Product 3</h3>
        <p class="price">₹1000</p>
        <button onclick="addToCart('Product 3', 1000)">Add to Cart</button>
    </div>

</section>

<!-- CART -->
<section class="cart-section">
    <h2>🛍 Your Cart</h2>

    <ul id="cart"></ul>

    <h3>Total: ₹<span id="total">0</span></h3>

    <button class="checkout-btn" onclick="checkout()">Checkout</button>
</section>

<script src="script.js"></script>

</body>
</html>
