<!DOCTYPE html>
<html>
<head>
    <title>MediNearby - Doctor Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>MediNearby</h1>
    <p>Find Top 10 Doctors Near Your Area</p>

    <div class="container">
        <label>Select Specialization:</label>
        <select id="specialization">
            <option value="">-- Select --</option>
            <option value="Cardiologist">Cardiologist</option>
            <option value="Dentist">Dentist</option>
            <option value="Dermatologist">Dermatologist</option>
        </select>

        <label>Enter Your Area:</label>
        <input type="text" id="area" placeholder="e.g. Sector 14">

        <button onclick="findDoctors()">Find Doctors</button>
    </div>

    <h2>Top Doctors Near You</h2>
    <ul id="doctorList"></ul>
    <script src="script.js"></script>
</body>
</html>
