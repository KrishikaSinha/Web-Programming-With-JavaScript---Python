{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<h2>All Blog Posts</h2>

{% for post in posts %}
<div class="post">
    <h3>{{ post.title }}</h3>
    <p>{{ post.content }}</p>

    <a href="/edit/{{ post.id }}">Edit</a>
    <a href="/delete/{{ post.id }}">Delete</a>
</div>
{% else %}
<p>No posts yet 😢</p>
{% endfor %}

{% endblock %}
