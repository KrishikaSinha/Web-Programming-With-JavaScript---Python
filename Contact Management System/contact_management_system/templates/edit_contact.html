{% extends 'base.html' %}

{% block content %}

<div class="form-container">

    <h2 class="title">✏️ Edit Contact</h2>

    <form method="POST" class="form-box">

        <div class="input-group">
            <label>Name</label>
            <input 
                type="text" 
                name="name" 
                value="{{ contact.name }}" 
                placeholder="Enter name"
                required
            >
        </div>

        <div class="input-group">
            <label>Phone</label>
            <input 
                type="text" 
                name="phone" 
                value="{{ contact.phone }}" 
                placeholder="Enter phone number"
                required
            >
        </div>

        <div class="input-group">
            <label>Email</label>
            <input 
                type="email" 
                name="email" 
                value="{{ contact.email }}" 
                placeholder="Enter email"
                required
            >
        </div>

        <div class="btn-group">
            <button type="submit" class="btn-update">💾 Update</button>
            <a href="{{ url_for('index') }}" class="btn-cancel">⬅ Cancel</a>
        </div>

    </form>

</div>

{% endblock %}
