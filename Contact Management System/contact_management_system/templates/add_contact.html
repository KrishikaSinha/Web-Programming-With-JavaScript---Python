{% extends 'base.html' %}
{% block content %}

<h2>Add Contact</h2>

<form method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="text" name="phone" placeholder="Phone" required>
    <input type="email" name="email" placeholder="Email" required>
    <button type="submit">Add</button>
</form>

{% endblock %}
