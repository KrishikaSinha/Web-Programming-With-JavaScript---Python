{% extends 'base.html' %}
{% block content %}

<h2>📒 Contact List</h2>

<form method="GET">
    <input type="text" name="search" placeholder="Search..." />
    <button type="submit">Search</button>
</form>

<table>
<tr>
    <th>Name</th>
    <th>Phone</th>
    <th>Email</th>
    <th>Actions</th>
</tr>

{% for c in contacts %}
<tr>
    <td>{{ c.name }}</td>
    <td>{{ c.phone }}</td>
    <td>{{ c.email }}</td>
    <td>
        <a href="/edit/{{ c.id }}">Edit</a>
        <a href="/delete/{{ c.id }}">Delete</a>
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
